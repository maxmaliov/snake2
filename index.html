<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Neon Hill Racer</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00ffff;
            --neon-magenta: #ff00ff;
            --bg-dark: #020010;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: radial-gradient(ellipse at center, #0a0015 0%, #020010 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron', sans-serif;
            touch-action: manipulation;
            user-select: none; -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            color: white;
        }
        .app {
            width: 100%; max-width: 800px; padding: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 25px;
        }
        .screen { display: none; width: 100%; flex-direction: column; align-items: center; gap: 25px; }
        .screen.active { display: flex; }

        .title {
            font-size: 2.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 6px;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px var(--neon-cyan), 0 0 40px var(--neon-magenta), 0 0 80px var(--neon-cyan);
            animation: flicker 2s infinite alternate; text-align: center; line-height: 1.2;
        }
        @keyframes flicker {
            0% { opacity:1; text-shadow: 0 0 15px var(--neon-cyan), 0 0 40px var(--neon-magenta), 0 0 80px var(--neon-cyan); }
            50% { opacity:0.85; text-shadow: 0 0 8px var(--neon-cyan), 0 0 25px var(--neon-magenta), 0 0 50px var(--neon-cyan); }
            100% { opacity:1; text-shadow: 0 0 18px var(--neon-cyan), 0 0 50px var(--neon-magenta), 0 0 100px var(--neon-cyan); }
        }

        .menu-btn {
            font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 1.2rem; letter-spacing: 3px;
            text-transform: uppercase; padding: 16px 40px; border: 2px solid var(--neon-cyan);
            background: rgba(0,255,255,0.05); color: var(--neon-cyan); border-radius: 40px;
            box-shadow: 0 0 15px var(--neon-cyan); cursor: pointer; backdrop-filter: blur(4px);
            transition: all 0.2s; width: 240px; text-align: center;
        }
        .menu-btn:active {
            background: rgba(0,255,255,0.25); box-shadow: 0 0 30px var(--neon-cyan), 0 0 60px var(--neon-magenta);
            border-color: var(--neon-magenta); color: var(--neon-magenta); transform: scale(0.96);
        }
        .menu-btn.secondary { border-color: var(--neon-magenta); color: var(--neon-magenta); box-shadow: 0 0 15px var(--neon-magenta); }
        .menu-btn.secondary:active { border-color: var(--neon-cyan); color: var(--neon-cyan); }

        .subtitle {
            font-size: 1.8rem; font-weight: 700; letter-spacing: 3px; color: var(--neon-magenta);
            text-shadow: 0 0 10px var(--neon-magenta), 0 0 20px var(--neon-cyan); text-align: center;
        }

        .setting-row { display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .setting-label { text-transform: uppercase; letter-spacing: 2px; color: var(--neon-cyan); }
        .options { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .opt-btn {
            font-family: 'Orbitron', sans-serif; padding: 8px 20px; border: 1px solid var(--neon-magenta);
            background: transparent; color: var(--neon-magenta); border-radius: 20px; cursor: pointer;
            letter-spacing: 1px; transition: all 0.2s;
        }
        .opt-btn.selected { background: rgba(255,0,255,0.25); box-shadow: 0 0 12px var(--neon-magenta); border-color: var(--neon-cyan); color: var(--neon-cyan); }

        .history-box {
            width: 100%; max-height: 250px; overflow-y: auto; background: rgba(0,255,255,0.05);
            border: 1px solid var(--neon-cyan); border-radius: 12px; padding: 12px;
            box-shadow: 0 0 15px rgba(0,255,255,0.3);
        }
        .history-item { display: flex; justify-content: space-between; padding: 6px 10px; border-bottom: 1px solid rgba(0,255,255,0.2); font-size: 0.9rem; }
        .history-item:last-child { border-bottom: none; }

        .game-container {
            display: flex; flex-direction: column; align-items: center; width: 100%; gap: 15px;
        }
        canvas {
            border: 2px solid var(--neon-magenta);
            box-shadow: 0 0 25px var(--neon-magenta), 0 0 60px rgba(0,255,255,0.4);
            border-radius: 12px; background: #05051a; touch-action: none;
            max-width: 100%; height: auto;
        }

        .controls {
            display: flex; gap: 20px; align-items: center; justify-content: center; flex-wrap: wrap;
        }
        .gas-brake, .tilt {
            display: flex; gap: 10px;
        }
        .ctrl-btn {
            width: 70px; height: 70px; border-radius: 35px;
            border: 2px solid var(--neon-cyan); background: rgba(0,255,255,0.1);
            color: var(--neon-cyan); font-size: 2.5rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.1s; touch-action: manipulation;
            box-shadow: 0 0 12px var(--neon-cyan);
        }
        .ctrl-btn:active {
            background: rgba(0,255,255,0.4); box-shadow: 0 0 25px var(--neon-cyan);
            border-color: var(--neon-magenta); color: var(--neon-magenta);
        }
        .game-info {
            display: flex; justify-content: space-between; width: 100%; align-items: center; flex-wrap: wrap; gap:10px;
        }
        .info-text { font-size: 1.2rem; letter-spacing: 2px; color: var(--neon-magenta); text-shadow: 0 0 8px var(--neon-magenta); }
        .menu-exit-btn { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); font-family: 'Orbitron', sans-serif; padding: 8px 20px; border-radius: 20px; cursor: pointer; }

        .overlay {
            display: none; position: absolute; top:0; left:0; right:0; bottom:0;
            background: rgba(2,0,16,0.92); flex-direction: column; align-items: center; justify-content: center;
            gap: 20px; border-radius: 12px; z-index: 10; backdrop-filter: blur(4px);
        }
        .overlay.active { display: flex; }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- MENU -->
    <div id="menuScreen" class="screen active">
        <h1 class="title">NEON<br>HILL RACER</h1>
        <button class="menu-btn" id="playBtn" data-lang="play">ИГРАТЬ</button>
        <button class="menu-btn secondary" id="settingsBtn" data-lang="settings">НАСТРОЙКИ</button>
        <button class="menu-btn secondary" id="historyBtn" data-lang="history">ИСТОРИЯ</button>
    </div>

    <!-- SETTINGS -->
    <div id="settingsScreen" class="screen">
        <h2 class="subtitle" data-lang="settings_title">НАСТРОЙКИ</h2>
        <div class="setting-row">
            <span class="setting-label" data-lang="difficulty">СЛОЖНОСТЬ</span>
            <div class="options" id="diffOptions">
                <button class="opt-btn" data-diff="easy" data-lang="easy">ЛЁГКАЯ</button>
                <button class="opt-btn selected" data-diff="medium" data-lang="medium">СРЕДНЯЯ</button>
                <button class="opt-btn" data-diff="hard" data-lang="hard">СЛОЖНАЯ</button>
            </div>
        </div>
        <div class="setting-row">
            <span class="setting-label" data-lang="language">ЯЗЫК</span>
            <div class="options" id="langOptions">
                <button class="opt-btn selected" data-lang-code="ru">RU</button>
                <button class="opt-btn" data-lang-code="en">EN</button>
            </div>
        </div>
        <div class="setting-row">
            <span class="setting-label" data-lang="sound">ЗВУК</span>
            <div class="options" id="soundOptions">
                <button class="opt-btn selected" data-sound="on" data-lang="on">ВКЛ</button>
                <button class="opt-btn" data-sound="off" data-lang="off">ВЫКЛ</button>
            </div>
        </div>
        <button class="menu-btn secondary" id="backFromSettings" data-lang="back">НАЗАД</button>
    </div>

    <!-- HISTORY -->
    <div id="historyScreen" class="screen">
        <h2 class="subtitle" data-lang="history_title">ИСТОРИЯ РЕКОРДОВ</h2>
        <div class="history-box" id="historyList"><div style="text-align:center; color:#ff00ff;">Нет записей</div></div>
        <button class="menu-btn secondary" id="backFromHistory" data-lang="back">НАЗАД</button>
    </div>

    <!-- GAME -->
    <div id="gameScreen" class="screen">
        <div class="game-info">
            <button class="menu-exit-btn" id="exitGameBtn" data-lang="menu">МЕНЮ</button>
            <span class="info-text" id="distanceDisplay">0 m</span>
            <span class="info-text" id="fuelDisplay">⛽ 100%</span>
            <span class="info-text" id="scoreDisplay">0</span>
        </div>
        <canvas id="gameCanvas" width="800" height="400"></canvas>
        <div class="controls">
            <div class="gas-brake">
                <button class="ctrl-btn" id="brakeBtn">▼</button>
                <button class="ctrl-btn" id="gasBtn">▲</button>
            </div>
            <div class="tilt">
                <button class="ctrl-btn" id="tiltLeftBtn">◀</button>
                <button class="ctrl-btn" id="tiltRightBtn">▶</button>
            </div>
        </div>
        <div class="overlay" id="gameOverOverlay">
            <h2 style="color:#ff0044; text-shadow:0 0 20px #ff0044; font-size:2rem;" data-lang="lose">АВАРИЯ</h2>
            <p id="finalScoreText" style="font-size:1.5rem;"></p>
            <button class="menu-btn" id="restartBtn" data-lang="restart">ЗАНОВО</button>
            <button class="menu-btn secondary" id="menuOverlayBtn" data-lang="menu">МЕНЮ</button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ========== LOCALIZATION ==========
        const translations = {
            ru: {
                play: "ИГРАТЬ", settings: "НАСТРОЙКИ", history: "ИСТОРИЯ",
                settings_title: "НАСТРОЙКИ", difficulty: "СЛОЖНОСТЬ", easy: "ЛЁГКАЯ", medium: "СРЕДНЯЯ", hard: "СЛОЖНАЯ",
                language: "ЯЗЫК", sound: "ЗВУК", on: "ВКЛ", off: "ВЫКЛ", back: "НАЗАД",
                history_title: "ИСТОРИЯ РЕКОРДОВ", no_records: "Нет записей",
                menu: "МЕНЮ", lose: "АВАРИЯ", restart: "ЗАНОВО", distance: "ДИСТАНЦИЯ", score: "ОЧКИ"
            },
            en: {
                play: "PLAY", settings: "SETTINGS", history: "HISTORY",
                settings_title: "SETTINGS", difficulty: "DIFFICULTY", easy: "EASY", medium: "MEDIUM", hard: "HARD",
                language: "LANGUAGE", sound: "SOUND", on: "ON", off: "OFF", back: "BACK",
                history_title: "SCORE HISTORY", no_records: "No records",
                menu: "MENU", lose: "CRASH", restart: "RESTART", distance: "DISTANCE", score: "SCORE"
            }
        };
        let currentLang = 'ru';
        function t(key) { return translations[currentLang]?.[key] || key; }
        function applyLanguage() {
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.dataset.lang;
                if (key && translations[currentLang][key]) {
                    el.innerHTML = translations[currentLang][key];
                }
            });
        }

        // ========== STORAGE ==========
        const STORAGE_KEYS = { HISTORY: 'hillracer_history', SETTINGS: 'hillracer_settings' };
        let settings = { difficulty: 'medium', sound: 'on', lang: 'ru' };
        let history = [];
        function loadSettings() {
            try { const s = localStorage.getItem(STORAGE_KEYS.SETTINGS); if(s) settings = {...settings, ...JSON.parse(s)}; currentLang = settings.lang || 'ru'; } catch(e){}
        }
        function saveSettings() { localStorage.setItem(STORAGE_KEYS.SETTINGS, JSON.stringify(settings)); }
        function loadHistory() { try { const h = localStorage.getItem(STORAGE_KEYS.HISTORY); history = h ? JSON.parse(h) : []; } catch(e){} }
        function saveHistory() { localStorage.setItem(STORAGE_KEYS.HISTORY, JSON.stringify(history)); }
        function addHistory(dist, score) {
            history.unshift({ dist, score, date: new Date().toLocaleString() });
            if(history.length > 10) history.pop();
            saveHistory();
        }

        // ========== AUDIO ==========
        let audioCtx = null;
        function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }
        function playSound(freq, type='square', dur=0.1, vol=0.15) {
            if(!audioCtx || settings.sound !== 'on') return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
            g.gain.setValueAtTime(vol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime+dur);
        }

        // ========== SCREENS ==========
        const screens = {
            menu: document.getElementById('menuScreen'),
            settings: document.getElementById('settingsScreen'),
            history: document.getElementById('historyScreen'),
            game: document.getElementById('gameScreen')
        };
        function showScreen(id) {
            Object.values(screens).forEach(s => s.classList.remove('active'));
            screens[id].classList.add('active');
            if(id === 'game') startGame();
            else stopGame();
        }

        // ========== GAME CONSTANTS ==========
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        const GRAVITY = 800; // px/s^2
        const CAR_LENGTH = 80;
        const CAR_HEIGHT = 30;
        const WHEEL_RADIUS = 12;
        const SPRING_K = 2000;
        const DAMPER = 30;
        const FRICTION = 0.8;
        const MOTOR_FORCE = 800; // приложенная сила на заднее колесо
        const TILT_TORQUE = 300;  // момент для баланса
        const FUEL_MAX = 100;
        const FUEL_CONSUMPTION = 2; // % в секунду при газе

        // ========== GAME STATE ==========
        let car = {
            x: 200, y: 300,           // центр кузова
            vx: 0, vy: 0,
            angle: 0, angularVel: 0
        };
        let fuel = FUEL_MAX;
        let distance = 0;
        let score = 0;
        let gameActive = false;
        let animFrame = null;

        // Управление
        let gasPressed = false, brakePressed = false;
        let tiltLeft = false, tiltRight = false;

        // Объекты
        let coins = [], fuelCans = [];
        let groundPoints = []; // массив {x,y} для визуализации ландшафта (процедурный)

        function generateGround(x) {
            // Функция рельефа: синусоиды разной частоты
            const freq1 = 0.02, freq2 = 0.05, freq3 = 0.1;
            const amp1 = 40, amp2 = 20, amp3 = 10;
            return Math.sin(x * freq1) * amp1 + Math.sin(x * freq2) * amp2 + Math.cos(x * freq3) * amp3 + 250;
        }

        function getGroundY(x) {
            return generateGround(x);
        }

        function getGroundAngle(x) {
            // угол касательной
            const dx = 1;
            const y0 = getGroundY(x - dx);
            const y1 = getGroundY(x + dx);
            return Math.atan2(y1 - y0, 2*dx);
        }

        function spawnObjects(centerX) {
            // Размещаем монеты и канистры впереди игрока
            const spread = 400;
            const minX = car.x - 200;
            const maxX = car.x + spread;
            // удаляем далёкие объекты позади
            coins = coins.filter(c => c.x > car.x - 500);
            fuelCans = fuelCans.filter(f => f.x > car.x - 500);
            // добавляем новые впереди
            while (coins.length < 20) {
                const rx = maxX - 100 + Math.random() * 600;
                const groundY = getGroundY(rx);
                coins.push({x: rx, y: groundY - 30 - Math.random() * 50});
            }
            while (fuelCans.length < 5) {
                const rx = maxX + Math.random() * 400;
                const groundY = getGroundY(rx);
                fuelCans.push({x: rx, y: groundY - 30});
            }
        }

        function resetGame() {
            car = {
                x: 200, y: 200,
                vx: 30, vy: 0,
                angle: 0, angularVel: 0
            };
            fuel = FUEL_MAX;
            distance = 0;
            score = 0;
            coins = [];
            fuelCans = [];
            gameActive = true;
            document.getElementById('gameOverOverlay').classList.remove('active');
            spawnObjects(car.x);
            updateUI();
        }

        function updateUI() {
            document.getElementById('distanceDisplay').textContent = `${Math.floor(distance)} m`;
            document.getElementById('fuelDisplay').textContent = `⛽ ${Math.ceil(fuel)}%`;
            document.getElementById('scoreDisplay').textContent = score;
        }

        // ========== PHYSICS ==========
        function physicsStep(dt) {
            if (!gameActive) return;

            // Топливо
            if (gasPressed) {
                fuel = Math.max(0, fuel - FUEL_CONSUMPTION * dt);
                if (fuel <= 0) {
                    gameActive = false;
                    gameOver();
                    return;
                }
            }

            // Силы и моменты
            let totalForceX = 0, totalForceY = 0;
            let totalTorque = 0;

            // Гравитация
            totalForceY += GRAVITY;

            // Колёса: заднее и переднее
            const halfLen = CAR_LENGTH / 2;
            const wheelOffsetX = [ -halfLen, halfLen ];
            const wheelNames = ['rear', 'front'];

            for (let i = 0; i < 2; i++) {
                const offset = wheelOffsetX[i];
                // мировые координаты точки крепления колеса
                const wx = car.x + offset * Math.cos(car.angle);
                const wy = car.y + offset * Math.sin(car.angle) - CAR_HEIGHT/2 - 5; // смещение вниз

                const groundY = getGroundY(wx);
                const wheelY = wy - WHEEL_RADIUS;
                const penetration = groundY - wheelY; // положительно если колесо над землёй? на самом деле если groundY > wheelY -> проникло

                if (penetration > 0) {
                    // колесо погружено в землю
                    const springForce = SPRING_K * penetration - DAMPER * car.vy; // упрощённо демпфирование вертикальной скорости
                    const normalAngle = getGroundAngle(wx);
                    const normalX = -Math.sin(normalAngle);
                    const normalY = Math.cos(normalAngle);
                    // нормальная сила
                    const Fn = springForce;
                    totalForceX += normalX * Fn;
                    totalForceY += normalY * Fn;
                    // точка приложения силы = крепление колеса
                    const rx = wx - car.x;
                    const ry = wy - car.y;
                    totalTorque += rx * (normalY * Fn) - ry * (normalX * Fn);

                    // Трение
                    const tangentAngle = normalAngle;
                    const tangentX = Math.cos(tangentAngle);
                    const tangentY = Math.sin(tangentAngle);
                    // скорость точки колеса
                    const wheelVelX = car.vx - car.angularVel * ry;
                    const wheelVelY = car.vy + car.angularVel * rx;
                    const tangentVel = wheelVelX * tangentX + wheelVelY * tangentY;
                    const frictionForce = -Math.sign(tangentVel) * FRICTION * Math.abs(Fn);
                    totalForceX += tangentX * frictionForce;
                    totalForceY += tangentY * frictionForce;
                    totalTorque += rx * (tangentY * frictionForce) - ry * (tangentX * frictionForce);

                    // Мотор только на заднее колесо (i===0)
                    if (i === 0) {
                        if (gasPressed) {
                            const motorF = MOTOR_FORCE * (fuel > 0 ? 1 : 0);
                            totalForceX += tangentX * motorF;
                            totalForceY += tangentY * motorF;
                            totalTorque += rx * (tangentY * motorF) - ry * (tangentX * motorF);
                        } else if (brakePressed) {
                            const brakeForce = -MOTOR_FORCE * 0.5;
                            totalForceX += tangentX * brakeForce;
                            totalForceY += tangentY * brakeForce;
                            totalTorque += rx * (tangentY * brakeForce) - ry * (tangentX * brakeForce);
                        }
                    }
                }
            }

            // Наклон (управление балансом)
            if (tiltLeft) totalTorque -= TILT_TORQUE;
            if (tiltRight) totalTorque += TILT_TORQUE;

            // Применяем силы
            const mass = 1; // условная масса
            car.vx += totalForceX * dt / mass;
            car.vy += totalForceY * dt / mass;
            car.x += car.vx * dt;
            car.y += car.vy * dt;
            car.angularVel += totalTorque * dt / mass;
            car.angle += car.angularVel * dt;

            // Проверка переворота: если угол сильно отклонился (почти перевёрнут)
            if (Math.abs(car.angle) > Math.PI/2) {
                gameActive = false;
                gameOver();
                return;
            }

            // Обновление дистанции (пройденный путь по x)
            distance += Math.max(0, car.vx * dt * 0.1); // масштаб

            // Сбор предметов
            const carBox = {
                left: car.x - CAR_LENGTH/2,
                right: car.x + CAR_LENGTH/2,
                top: car.y - CAR_HEIGHT/2,
                bottom: car.y + CAR_HEIGHT/2
            };
            coins = coins.filter(coin => {
                if (coin.x > carBox.left && coin.x < carBox.right && coin.y > carBox.top && coin.y < carBox.bottom) {
                    score += 10;
                    playSound(600, 'sine', 0.1);
                    return false;
                }
                return true;
            });
            fuelCans = fuelCans.filter(can => {
                if (can.x > carBox.left && can.x < carBox.right && can.y > carBox.top && can.y < carBox.bottom) {
                    fuel = Math.min(FUEL_MAX, fuel + 30);
                    playSound(800, 'sine', 0.15);
                    return false;
                }
                return true;
            });

            // Генерация новых объектов
            spawnObjects(car.x);
        }

        function gameOver() {
            gameActive = false;
            addHistory(Math.floor(distance), score);
            document.getElementById('finalScoreText').textContent = `${t('distance')}: ${Math.floor(distance)} m, ${t('score')}: ${score}`;
            document.getElementById('gameOverOverlay').classList.add('active');
            playSound(150, 'sawtooth', 0.3);
        }

        function restartGame() {
            document.getElementById('gameOverOverlay').classList.remove('active');
            resetGame();
        }

        // ========== RENDERING ==========
        function drawGround() {
            ctx.save();
            ctx.strokeStyle = '#ff00ff';
            ctx.lineWidth = 3;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff00ff';
            ctx.beginPath();
            const startX = car.x - W/2 - 100;
            const endX = car.x + W/2 + 100;
            const step = 5;
            let first = true;
            for (let x = startX; x <= endX; x += step) {
                const y = getGroundY(x);
                const sx = W/2 + (x - car.x);
                const sy = H - (y - car.y) - 50; // смещение камеры
                if (first) { ctx.moveTo(sx, sy); first = false; }
                else ctx.lineTo(sx, sy);
            }
            ctx.stroke();
            ctx.restore();
        }

        function drawCar() {
            ctx.save();
            const sx = W/2;
            const sy = H/2; // камера фиксирована на car
            ctx.translate(sx, sy);
            ctx.rotate(car.angle);
            // Кузов
            ctx.fillStyle = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00ffff';
            ctx.fillRect(-CAR_LENGTH/2, -CAR_HEIGHT/2, CAR_LENGTH, CAR_HEIGHT);
            // Колёса
            ctx.fillStyle = '#ff00ff';
            const wheelX = [-CAR_LENGTH/2, CAR_LENGTH/2];
            wheelX.forEach(wx => {
                ctx.beginPath();
                ctx.arc(wx, CAR_HEIGHT/2 + 5, WHEEL_RADIUS, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.restore();
        }

        function drawObjects() {
            ctx.save();
            coins.forEach(c => {
                const sx = W/2 + (c.x - car.x);
                const sy = H/2 - (c.y - car.y);
                ctx.fillStyle = '#ffff00';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ffff00';
                ctx.beginPath();
                ctx.arc(sx, sy, 6, 0, Math.PI*2);
                ctx.fill();
            });
            fuelCans.forEach(c => {
                const sx = W/2 + (c.x - car.x);
                const sy = H/2 - (c.y - car.y);
                ctx.fillStyle = '#ff4400';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#ff4400';
                ctx.fillRect(sx-6, sy-8, 12, 16);
            });
            ctx.restore();
        }

        function drawBackground() {
            const grad = ctx.createLinearGradient(0,0,0,H);
            grad.addColorStop(0,'#0a0015');
            grad.addColorStop(1,'#020010');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,W,H);
        }

        function render() {
            ctx.clearRect(0,0,W,H);
            drawBackground();
            drawGround();
            drawObjects();
            drawCar();
        }

        function gameLoop() {
            if (!gameActive) {
                animFrame = requestAnimationFrame(gameLoop);
                return;
            }
            const dt = Math.min(0.02, 1/60); // фиксируем dt для стабильности
            for (let i=0; i<4; i++) physicsStep(dt/4); // подшаги
            updateUI();
            render();
            animFrame = requestAnimationFrame(gameLoop);
        }

        function stopGameLoop() {
            if (animFrame) cancelAnimationFrame(animFrame);
            animFrame = null;
        }

        function startGame() {
            resetGame();
            if (!animFrame) animFrame = requestAnimationFrame(gameLoop);
        }

        // ========== CONTROLS ==========
        document.getElementById('gasBtn').addEventListener('touchstart', e => { e.preventDefault(); gasPressed = true; });
        document.getElementById('gasBtn').addEventListener('touchend', e => { e.preventDefault(); gasPressed = false; });
        document.getElementById('brakeBtn').addEventListener('touchstart', e => { e.preventDefault(); brakePressed = true; });
        document.getElementById('brakeBtn').addEventListener('touchend', e => { e.preventDefault(); brakePressed = false; });
        document.getElementById('tiltLeftBtn').addEventListener('touchstart', e => { e.preventDefault(); tiltLeft = true; });
        document.getElementById('tiltLeftBtn').addEventListener('touchend', e => { e.preventDefault(); tiltLeft = false; });
        document.getElementById('tiltRightBtn').addEventListener('touchstart', e => { e.preventDefault(); tiltRight = true; });
        document.getElementById('tiltRightBtn').addEventListener('touchend', e => { e.preventDefault(); tiltRight = false; });

        window.addEventListener('keydown', e => {
            if (!gameActive) return;
            switch(e.key) {
                case 'ArrowUp': e.preventDefault(); gasPressed = true; break;
                case 'ArrowDown': e.preventDefault(); brakePressed = true; break;
                case 'ArrowLeft': e.preventDefault(); tiltLeft = true; break;
                case 'ArrowRight': e.preventDefault(); tiltRight = true; break;
            }
        });
        window.addEventListener('keyup', e => {
            switch(e.key) {
                case 'ArrowUp': gasPressed = false; break;
                case 'ArrowDown': brakePressed = false; break;
                case 'ArrowLeft': tiltLeft = false; break;
                case 'ArrowRight': tiltRight = false; break;
            }
        });

        // ========== UI BINDINGS ==========
        document.getElementById('playBtn').addEventListener('click', () => { initAudio(); showScreen('game'); });
        document.getElementById('settingsBtn').addEventListener('click', () => showScreen('settings'));
        document.getElementById('historyBtn').addEventListener('click', () => { updateHistoryUI(); showScreen('history'); });
        document.getElementById('backFromSettings').addEventListener('click', () => showScreen('menu'));
        document.getElementById('backFromHistory').addEventListener('click', () => showScreen('menu'));
        document.getElementById('exitGameBtn').addEventListener('click', () => { stopGameLoop(); showScreen('menu'); });
        document.getElementById('restartBtn').addEventListener('click', restartGame);
        document.getElementById('menuOverlayBtn').addEventListener('click', () => { stopGameLoop(); showScreen('menu'); });

        // Settings
        document.getElementById('diffOptions').addEventListener('click', e => {
            if(e.target.classList.contains('opt-btn')) { settings.difficulty = e.target.dataset.diff; saveSettings(); updateSettingsUI(); }
        });
        document.getElementById('langOptions').addEventListener('click', e => {
            if(e.target.classList.contains('opt-btn')) { settings.lang = e.target.dataset.langCode; currentLang = settings.lang; saveSettings(); applyLanguage(); updateSettingsUI(); updateHistoryUI(); }
        });
        document.getElementById('soundOptions').addEventListener('click', e => {
            if(e.target.classList.contains('opt-btn')) { settings.sound = e.target.dataset.sound; saveSettings(); updateSettingsUI(); if(settings.sound==='on') initAudio(); }
        });

        function updateSettingsUI() {
            document.querySelectorAll('#diffOptions .opt-btn').forEach(b => b.classList.toggle('selected', b.dataset.diff === settings.difficulty));
            document.querySelectorAll('#langOptions .opt-btn').forEach(b => b.classList.toggle('selected', b.dataset.langCode === settings.lang));
            document.querySelectorAll('#soundOptions .opt-btn').forEach(b => b.classList.toggle('selected', b.dataset.sound === settings.sound));
        }
        function updateHistoryUI() {
            const list = document.getElementById('historyList');
            if(history.length === 0) list.innerHTML = `<div style="text-align:center; color:#ff00ff;">${t('no_records')}</div>`;
            else list.innerHTML = history.map(r => `<div class="history-item"><span>${r.dist} m — ${r.score} pts</span><span>${r.date}</span></div>`).join('');
        }

        // Init
        function init() {
            loadSettings(); loadHistory();
            currentLang = settings.lang || 'ru';
            applyLanguage(); updateSettingsUI(); updateHistoryUI();
            showScreen('menu');
            // Предварительная генерация начального ландшафта
            car.x = 200; car.y = getGroundY(200) - 100;
            spawnObjects(car.x);
        }
        init();
    })();
</script>
</body>
</html>
